name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: virtualtrading
          POSTGRES_USER: vte
          POSTGRES_PASSWORD: vtepass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vte -d virtualtrading"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_PROFILES_ACTIVE: test
      JWT_SECRET: test-secret-key-with-at-least-32-characters
      ALPHAVANTAGE_API_KEY: demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and test
        run: mvn -B -e -X clean verify